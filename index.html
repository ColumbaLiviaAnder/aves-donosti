<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aves de Donosti - Guía Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-100 text-stone-800 font-sans">

    <header class="bg-green-600 text-white text-center py-12 px-4 shadow-md">
        <h1 class="text-4xl font-bold tracking-tight">🐦 Aves de Donosti</h1>
        <p class="mt-2 text-lg text-teal-100">Descubre y aprende sobre los vecinos con plumas de San Sebastián</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <section class="mb-10 text-center">
            <h2 class="text-xl font-semibold mb-4">¿Dónde estás buscando?</h2>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="filtrarAves('todas')" class="px-5 py-2 bg-teal-700 text-white rounded-full font-medium shadow hover:bg-teal-800 transition">🌍 Todas</button>
                <button onclick="filtrarAves('rio')" class="px-5 py-2 bg-blue-500 text-white rounded-full font-medium shadow hover:bg-blue-600 transition">💧 Río</button>
                <button onclick="filtrarAves('parque')" class="px-5 py-2 bg-green-600 text-white rounded-full font-medium shadow hover:bg-green-700 transition">🌳 Parque</button>
                <button onclick="filtrarAves('costa')" class="px-5 py-2 bg-sky-400 text-white rounded-full font-medium shadow hover:bg-sky-500 transition">🏖️ Costa y Playa</button>
            </div>
        </section>

        <section id="contenedor-aves" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </section>
    </main>

    <footer class="text-center py-8 text-stone-500 text-sm border-t border-stone-200 mt-12">
        <p>Creado con ❤️ para los futuros ornitólogos de Donosti.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
